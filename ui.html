<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        margin: 16px;
      }
      h2 {
        margin-top: 0;
        margin-bottom: 6px;
      }
      .subtitle {
        font-size: 12px;
        color: #555;
        margin: 0 0 14px;
        line-height: 1.4;
      }
      .divider {
        height: 1px;
        background: #eee;
        margin: 14px 0;
      }
      .section {
        margin-bottom: 14px;
      }
      .card {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 10px;
        background: #fafafa;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 6px;
      }
      .label {
        font-size: 12px;
        font-weight: 600;
      }
      button {
        padding: 6px 10px;
        border-radius: 4px;
        border: 1px solid #ccc;
        background: white;
        cursor: pointer;
        font-size: 12px;
      }
      button:hover {
        background: #f3f3f3;
      }
      button.primary {
        border-color: #111;
      }
      textarea,
      input[type='text'],
      select {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #ddd;
        border-radius: 6px;
        padding: 8px;
        font-size: 12px;
      }
      #result {
        padding: 8px;
        border-radius: 4px;
        border: 1px solid #ddd;
        background: #fafafa;
        font-size: 12px;
      }
      #resultSection {
        display: none;
      }
      .result-summary {
        font-weight: 600;
        margin-bottom: 10px;
      }
      .result-field {
        margin-bottom: 8px;
      }
      .result-field textarea {
        background: #fff;
      }
      .accordion {
        margin-bottom: 8px;
        border: 1px solid #ddd;
        border-radius: 6px;
        background: #fff;
      }
      .accordion summary {
        cursor: pointer;
        padding: 8px;
        font-weight: 600;
        font-size: 12px;
      }
      .accordion-content {
        padding: 0 8px 8px;
      }
      .diff-item {
        border: 1px solid #eee;
        border-radius: 6px;
        padding: 8px;
        margin-top: 8px;
        background: #fafafa;
      }
      .diff-line-label {
        font-size: 11px;
        font-weight: 600;
        color: #555;
        margin: 4px 0;
      }
      .diff-line {
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 12px;
        background: #fff;
        border: 1px solid #eee;
        border-radius: 4px;
        padding: 6px;
      }
      .hl-add {
        background: #e6f7e6;
        color: #1e7a1e;
        font-weight: 600;
      }
      .hl-del {
        color: #b42318;
        text-decoration: line-through;
        background: #ffecec;
      }
      .error {
        color: #c0392b;
      }
      .status {
        margin-top: 8px;
        font-size: 11px;
        color: #555;
      }
      .snapshot-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: 180px;
        overflow: auto;
      }
      .snapshot-item {
        border: 1px solid #e6e6e6;
        border-radius: 6px;
        padding: 8px;
        background: #fff;
      }
      .snapshot-title {
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .snapshot-date {
        color: #999999;
        font-weight: 400;
      }
      .snapshot-meta {
        font-size: 11px;
        color: #666;
        margin-bottom: 4px;
      }
      .snapshot-text {
        font-size: 11px;
        color: #444;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .empty {
        color: #777;
        font-size: 12px;
      }
      .toast {
        position: fixed;
        left: 50%;
        bottom: 12px;
        transform: translateX(-50%);
        background: #111;
        color: #fff;
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 12px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
        max-width: calc(100% - 24px);
        z-index: 9999;
      }
      .toast.show {
        opacity: 1;
      }
      .toast.error {
        background: #b42318;
      }
      #inputPage {
        display: block;
      }
      #resultPage {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="inputPage">
      <h2>chAInge.note</h2>
      <p class="subtitle">현재 선택한 프레임의 텍스트를 스냅샷으로 저장하고, 두 스냅샷을 비교해 변경 로그를 남깁니다.</p>

      <div class="divider"></div>

      <div class="section">
        <div class="row">
          <div class="label">1. 현재 상태 저장</div>
        </div>
        <input
          id="snapshotMemo"
          type="text"
          placeholder="이번 스냅샷 메모를 입력하세요. 예) QA 반영 전, 카피 수정 후"
        />
        <button class="primary" id="saveSnapshot" style="margin-top: 8px; width: 100%;">
          현재 상태 저장
        </button>
        <div id="saveStatus" class="status">프레임을 선택한 뒤 저장 버튼을 눌러주세요.</div>
      </div>

      <div class="section">
        <div class="row">
          <div class="label">2. 저장된 스냅샷 목록 (최근 10개)</div>
          <button id="refreshSnapshots">새로고침</button>
        </div>
        <div class="card">
          <div id="snapshotList" class="snapshot-list"></div>
        </div>
      </div>

      <div class="section">
        <div class="row">
          <div class="label">3. 비교할 스냅샷 선택</div>
        </div>
        <div class="card">
          <div style="margin-bottom: 8px;">
            <div class="label" style="margin-bottom: 4px;">Snapshot A</div>
            <select id="snapshotASelect"></select>
          </div>
          <div style="margin-bottom: 8px;">
            <div class="label" style="margin-bottom: 4px;">Snapshot B</div>
            <select id="snapshotBSelect"></select>
          </div>
        </div>
      </div>

      <button class="primary" id="compareBtn">비교</button>
    </div>

    <div id="resultPage">
      <div class="row">
        <h2 style="margin: 0;">결과</h2>
        <button id="backToInput">이전으로</button>
      </div>
      <p class="subtitle">선택한 두 스냅샷의 텍스트 차이를 비교한 결과입니다.</p>

      <div class="divider"></div>

      <div class="section" id="resultSection">
        <div id="result">
          <div id="resultSummary" class="result-summary">추가 0건 | 변경 0건 | 삭제 0건</div>

          <div id="snapshotCompareInfo" class="card" style="margin-bottom: 10px;"></div>

          <details id="addedAccordion" class="accordion">
            <summary id="addedSummary">추가 0건</summary>
            <div class="accordion-content">
              <div id="addedResult"></div>
            </div>
          </details>

          <details id="changedAccordion" class="accordion">
            <summary id="changedSummary">변경 0건</summary>
            <div class="accordion-content">
              <div id="changedResult"></div>
            </div>
          </details>

          <details id="deletedAccordion" class="accordion">
            <summary id="deletedSummary">삭제 0건</summary>
            <div class="accordion-content">
              <div id="deletedResult"></div>
            </div>
          </details>

          <button id="saveToFigma" style="margin-top: 8px; width: 100%;">로그 남기기</button>
        </div>
      </div>
    </div>
    <div id="toast" class="toast"></div>

    <script>
      const inputPageEl = document.getElementById('inputPage');
      const resultPageEl = document.getElementById('resultPage');
      const snapshotMemoEl = document.getElementById('snapshotMemo');
      const saveSnapshotBtn = document.getElementById('saveSnapshot');
      const refreshSnapshotsBtn = document.getElementById('refreshSnapshots');
      const compareBtn = document.getElementById('compareBtn');
      const backToInputBtn = document.getElementById('backToInput');
      const saveToFigmaBtn = document.getElementById('saveToFigma');
      const toastEl = document.getElementById('toast');
      const saveStatusEl = document.getElementById('saveStatus');
      const snapshotListEl = document.getElementById('snapshotList');
      const snapshotASelectEl = document.getElementById('snapshotASelect');
      const snapshotBSelectEl = document.getElementById('snapshotBSelect');
      const snapshotCompareInfoEl = document.getElementById('snapshotCompareInfo');
      const resultSummaryEl = document.getElementById('resultSummary');
      const addedResultEl = document.getElementById('addedResult');
      const changedResultEl = document.getElementById('changedResult');
      const deletedResultEl = document.getElementById('deletedResult');
      const addedAccordionEl = document.getElementById('addedAccordion');
      const changedAccordionEl = document.getElementById('changedAccordion');
      const deletedAccordionEl = document.getElementById('deletedAccordion');
      const addedSummaryEl = document.getElementById('addedSummary');
      const changedSummaryEl = document.getElementById('changedSummary');
      const deletedSummaryEl = document.getElementById('deletedSummary');
      const resultSectionEl = document.getElementById('resultSection');
      let latestResult = null;
      let snapshots = [];
      let toastTimer = null;

      function requestSnapshots() {
        parent.postMessage({ pluginMessage: { type: 'get-snapshots' } }, '*');
      }

      function showToast(message, isError = false) {
        if (!toastEl) return;
        if (toastTimer) clearTimeout(toastTimer);
        toastEl.textContent = message;
        toastEl.classList.toggle('error', isError);
        toastEl.classList.add('show');
        toastTimer = setTimeout(() => {
          toastEl.classList.remove('show');
        }, 2200);
      }

      function formatSnapshotDate(isoString) {
        const date = new Date(isoString);
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');
        return `${year}.${month}.${day} ${hours}:${minutes}`;
      }

      function makeSnapshotOptionLabel(snapshot) {
        const primaryLabel = snapshot.memo || snapshot.frameName;
        return `${primaryLabel} | ${formatSnapshotDate(snapshot.createdAt)}`;
      }

      function renderSnapshotList() {
        if (!snapshots.length) {
          snapshotListEl.innerHTML = '<div class="empty">아직 저장된 스냅샷이 없어요.</div>';
          return;
        }

        snapshotListEl.innerHTML = snapshots
          .map((snapshot) => {
            const preview = snapshot.texts.join('\n').slice(0, 140);
            const primaryLabel = snapshot.memo || snapshot.frameName;
            return `
              <div class="snapshot-item">
                <div class="snapshot-title">
                  ${escapeHtml(primaryLabel)}
                  <span class="snapshot-date">| ${escapeHtml(formatSnapshotDate(snapshot.createdAt))}</span>
                </div>
                <div class="snapshot-meta">${escapeHtml(snapshot.frameName)}</div>
                <div class="snapshot-text">${escapeHtml(preview)}${
                  preview.length >= 140 ? '...' : ''
                }</div>
              </div>
            `;
          })
          .join('');
      }

      function renderSnapshotSelects() {
        const placeholder = '<option value="">스냅샷을 선택하세요</option>';
        const options = snapshots
          .map(
            (snapshot) =>
              `<option value="${escapeHtml(snapshot.id)}">${escapeHtml(makeSnapshotOptionLabel(snapshot))}</option>`
          )
          .join('');

        snapshotASelectEl.innerHTML = placeholder + options;
        snapshotBSelectEl.innerHTML = placeholder + options;

        if (snapshots.length >= 1) snapshotASelectEl.value = snapshots[0].id;
        if (snapshots.length >= 2) snapshotBSelectEl.value = snapshots[1].id;
      }

      function updateSnapshotUI(nextSnapshots) {
        snapshots = Array.isArray(nextSnapshots) ? nextSnapshots : [];
        renderSnapshotList();
        renderSnapshotSelects();
      }

      saveSnapshotBtn.onclick = () => {
        saveStatusEl.textContent = '선택한 프레임의 텍스트를 저장하는 중...';
        parent.postMessage(
          {
            pluginMessage: {
              type: 'save-snapshot',
              memo: snapshotMemoEl.value || '',
            },
          },
          '*'
        );
      };

      refreshSnapshotsBtn.onclick = () => {
        saveStatusEl.textContent = '저장된 스냅샷 목록을 불러오는 중...';
        requestSnapshots();
      };

      backToInputBtn.onclick = () => {
        resultPageEl.style.display = 'none';
        inputPageEl.style.display = 'block';
      };

      function normalizeLines(text) {
        return text
          .split(/\r?\n/)
          .map((l) => l.trim())
          .filter((l) => l.length > 0);
      }

      function escapeHtml(text) {
        return text
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      // 단순한 prefix/suffix 기반 하이라이트 (초보자용 간단 버전)
      function makeInlineDiff(beforeLine, afterLine) {
        if (beforeLine === afterLine) {
          return {
            beforeHtml: escapeHtml(beforeLine),
            afterHtml: escapeHtml(afterLine),
          };
        }

        let start = 0;
        const minLen = Math.min(beforeLine.length, afterLine.length);
        while (start < minLen && beforeLine[start] === afterLine[start]) start += 1;

        let endBefore = beforeLine.length - 1;
        let endAfter = afterLine.length - 1;
        while (endBefore >= start && endAfter >= start && beforeLine[endBefore] === afterLine[endAfter]) {
          endBefore -= 1;
          endAfter -= 1;
        }

        const beforePrefix = beforeLine.slice(0, start);
        const beforeChanged = beforeLine.slice(start, endBefore + 1);
        const beforeSuffix = beforeLine.slice(endBefore + 1);

        const afterPrefix = afterLine.slice(0, start);
        const afterChanged = afterLine.slice(start, endAfter + 1);
        const afterSuffix = afterLine.slice(endAfter + 1);

        const beforeHtml =
          escapeHtml(beforePrefix) +
          (beforeChanged ? `<span class="hl-del">${escapeHtml(beforeChanged)}</span>` : '') +
          escapeHtml(beforeSuffix);

        const afterHtml =
          escapeHtml(afterPrefix) +
          (afterChanged ? `<span class="hl-add">${escapeHtml(afterChanged)}</span>` : '') +
          escapeHtml(afterSuffix);

        return { beforeHtml, afterHtml };
      }

      function summarizeChanges(beforeText, afterText) {
        const beforeLines = normalizeLines(beforeText);
        const afterLines = normalizeLines(afterText);
        const added = [];
        const changed = [];
        const deleted = [];
        const max = Math.max(beforeLines.length, afterLines.length);

        for (let i = 0; i < max; i++) {
          const beforeLine = beforeLines[i];
          const afterLine = afterLines[i];

          if (beforeLine !== undefined && afterLine !== undefined) {
            if (beforeLine !== afterLine) {
              changed.push({ before: beforeLine, after: afterLine });
            }
          } else if (beforeLine === undefined && afterLine !== undefined) {
            added.push(afterLine);
          } else if (beforeLine !== undefined && afterLine === undefined) {
            deleted.push(beforeLine);
          }
        }

        return { added, changed, deleted };
      }

      function getSnapshotById(snapshotId) {
        return snapshots.find((snapshot) => snapshot.id === snapshotId) || null;
      }

      compareBtn.onclick = () => {
        const snapshotA = getSnapshotById(snapshotASelectEl.value);
        const snapshotB = getSnapshotById(snapshotBSelectEl.value);

        if (!snapshotA || !snapshotB) {
          showToast('비교할 스냅샷 A와 B를 모두 선택해주세요.', true);
          return;
        }

        if (snapshotA.id === snapshotB.id) {
          showToast('서로 다른 스냅샷 2개를 선택해주세요.', true);
          return;
        }

        const beforeText = snapshotA.texts.join('\n');
        const afterText = snapshotB.texts.join('\n');
        inputPageEl.style.display = 'none';
        resultPageEl.style.display = 'block';
        resultSectionEl.style.display = 'block';

        const { added, changed, deleted } = summarizeChanges(beforeText, afterText);

        resultSummaryEl.textContent = `추가 ${added.length}건 | 변경 ${changed.length}건 | 삭제 ${deleted.length}건`;
        addedSummaryEl.textContent = `추가 ${added.length}건`;
        changedSummaryEl.textContent = `변경 ${changed.length}건`;
        deletedSummaryEl.textContent = `삭제 ${deleted.length}건`;

        addedAccordionEl.style.display = added.length > 0 ? 'block' : 'none';
        changedAccordionEl.style.display = changed.length > 0 ? 'block' : 'none';
        deletedAccordionEl.style.display = deleted.length > 0 ? 'block' : 'none';

        addedAccordionEl.open = added.length > 0;
        changedAccordionEl.open = changed.length > 0;
        deletedAccordionEl.open = deleted.length > 0;

        addedResultEl.innerHTML = added
          .map(
            (line) => `
            <div class="diff-item">
              <div class="diff-line-label">Before</div>
              <div class="diff-line"></div>
              <div class="diff-line-label">After</div>
              <div class="diff-line"><span class="hl-add">${escapeHtml(line)}</span></div>
            </div>
          `
          )
          .join('');

        changedResultEl.innerHTML = changed
          .map((item) => {
            const diff = makeInlineDiff(item.before, item.after);
            return `
              <div class="diff-item">
                <div class="diff-line-label">Before</div>
                <div class="diff-line">${diff.beforeHtml}</div>
                <div class="diff-line-label">After</div>
                <div class="diff-line">${diff.afterHtml}</div>
              </div>
            `;
          })
          .join('');

        deletedResultEl.innerHTML = deleted
          .map(
            (line) => `
            <div class="diff-item">
              <div class="diff-line-label">Before</div>
              <div class="diff-line"><span class="hl-del">${escapeHtml(line)}</span></div>
              <div class="diff-line-label">After</div>
              <div class="diff-line"></div>
            </div>
          `
          )
          .join('');

        snapshotCompareInfoEl.innerHTML = `
          <div style="font-weight: 600; margin-bottom: 6px;">비교 대상</div>
          <div style="font-size: 12px; margin-bottom: 4px;">A: ${escapeHtml(
            makeSnapshotOptionLabel(snapshotA)
          )}</div>
          <div style="font-size: 12px;">B: ${escapeHtml(makeSnapshotOptionLabel(snapshotB))}</div>
        `;

        latestResult = {
          summary: resultSummaryEl.textContent,
          snapshotA,
          snapshotB,
          added,
          changed,
          deleted,
        };
      };

      saveToFigmaBtn.onclick = () => {
        if (!latestResult) {
          showToast('먼저 "변경 내용 요약하기"를 눌러 결과를 만들어주세요.', true);
          return;
        }
        showToast('로그 페이지에 기록하는 중...');
        parent.postMessage({ pluginMessage: { type: 'save-log', payload: latestResult } }, '*');
      };

      // Figma(코드.ts)에서 보내는 메시지 받기
      onmessage = (event) => {
        const msg = event.data.pluginMessage;
        if (!msg) return;

        if (msg.type === 'snapshots-loaded') {
          updateSnapshotUI(msg.snapshots || []);
          saveStatusEl.textContent = `최근 ${Math.min((msg.snapshots || []).length, 10)}개의 스냅샷을 불러왔어요.`;
          return;
        }

        if (msg.type === 'save-snapshot-result') {
          if (msg.ok) {
            snapshotMemoEl.value = '';
            updateSnapshotUI(msg.snapshots || []);
          }
          saveStatusEl.textContent = msg.message || (msg.ok ? '저장 완료' : '저장 실패');
          showToast(saveStatusEl.textContent, !msg.ok);
          return;
        }

        if (msg.type === 'save-log-result') {
          showToast(msg.message || (msg.ok ? '저장 완료' : '저장 실패'), !msg.ok);
          return;
        }
      };

      requestSnapshots();
    </script>
  </body>
</html>
