<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --primary: #9c40ff;
        --primary-hover: #8a35e6;
        --border: #e2e5ec;
        --text: #202127;
        --text-muted: #5f6472;
        --text-placeholder: #9ca3af;
        --bg: #ffffff;
        --bg-subtle: #f7f8fa;
        --bg-selected: #f8f7fc;
        --danger: #e5484d;
        --danger-bg: #fff1f2;
        --success: #12a150;
        --success-bg: #e8f8ee;
        --radius: 4px;
        --plugin-width: 592px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        margin: 0;
        height: 100%;
        overflow-x: hidden;
        overflow-y: auto;
      }

      body {
        margin: 0;
        min-height: 100%;
        overflow-x: hidden;
        overflow-y: auto;
      }

      body {
        font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        padding: 48px;
        background: var(--bg);
        color: var(--text);
        font-size: 14px;
        line-height: 1.5;
        width: var(--plugin-width);
      }

      .logo {
        display: block;
        height: 32px;
        width: auto;
        max-width: 100%;
        margin: 0;
        object-fit: contain;
      }

      .title-section {
        border-bottom: 1px solid var(--border);
        padding-bottom: 24px;
        margin-bottom: 0;
      }

      .subtitle {
        font-size: 16px;
        color: var(--text-muted);
        margin: 12px 0 0;
        word-break: break-word;
      }

      .section {
        border-bottom: 1px solid var(--border);
        padding: 24px 0 32px;
      }

      .section:last-of-type {
        border-bottom: none;
        padding-bottom: 0;
      }

      .section-title {
        font-size: 24px;
        font-weight: 700;
        margin: 0 0 16px;
        line-height: 1.5;
        color: var(--text);
      }

      .section-header {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-bottom: 16px;
      }

      .section-header .section-title {
        margin: 0;
      }

      .section-desc {
        margin: 0;
        font-size: 16px;
        font-weight: 400;
        color: var(--text-muted);
        line-height: 1.5;
      }

      .field-group {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .field-label {
        display: block;
        font-size: 14px;
        color: var(--text-muted);
        margin: 0;
      }

      .field-block {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      input[type='text'] {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 0 16px;
        height: 40px;
        font-size: 14px;
        font-family: inherit;
        background: var(--bg);
        color: var(--text);
      }

      input[type='text']::placeholder {
        color: var(--text-placeholder);
      }

      input[type='text']:focus {
        outline: none;
        border-color: var(--primary);
      }

      button {
        font-family: inherit;
        font-size: 16px;
        font-weight: 700;
        border-radius: var(--radius);
        cursor: pointer;
        border: none;
        background: transparent;
        color: inherit;
        line-height: 1.5;
      }

      button:disabled {
        cursor: not-allowed;
      }

      .btn-outline-primary {
        width: 100%;
        height: 44px;
        border: 1px solid var(--primary);
        color: var(--primary);
        background: var(--bg);
        padding: 10px;
      }

      .btn-outline-primary:hover:not(:disabled) {
        background: var(--bg-selected);
      }

      .btn-secondary {
        flex-shrink: 0;
        height: 40px;
        padding: 8px 16px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text-muted);
        font-size: 14px;
        font-weight: 400;
        white-space: nowrap;
      }

      .btn-secondary:hover:not(:disabled) {
        background: var(--bg-selected);
      }

      .btn-compare {
        width: 100%;
        height: 44px;
        padding: 10px;
        margin-top: 48px;
        color: #fff;
        background: var(--primary);
        opacity: 0.4;
      }

      .btn-compare.is-active {
        opacity: 1;
      }

      .btn-compare.is-active:hover {
        background: var(--primary-hover);
      }

      .btn-primary-full {
        width: 100%;
        height: 44px;
        padding: 10px;
        color: #fff;
        background: var(--primary);
        margin-top: 48px;
      }

      .btn-primary-full:hover {
        background: var(--primary-hover);
      }

      .status {
        margin-top: 8px;
        width: 100%;
        font-size: 14px;
        line-height: 1.5;
        color: var(--text-muted);
        text-align: center;
      }

      .status:empty {
        display: none;
        margin-top: 0;
      }

      .snapshot-block {
        margin-bottom: 16px;
      }

      .snapshot-block:last-child {
        margin-bottom: 0;
      }

      .snapshot-block-label {
        font-size: 14px;
        color: var(--text-muted);
        margin: 0 0 4px;
      }

      .snapshot-row {
        display: flex;
        align-items: stretch;
        gap: 8px;
      }

      .snapshot-pick-area {
        flex: 1;
        min-width: 0;
        height: 40px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 0 16px;
        display: flex;
        align-items: center;
        background: var(--bg);
      }

      .snapshot-placeholder {
        color: var(--text-placeholder);
        font-size: 14px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .snapshot-selected {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        gap: 8px;
        min-width: 0;
      }

      .snapshot-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
        flex: 1;
        overflow: hidden;
      }

      .snapshot-selected-memo {
        font-weight: 700;
        font-size: 16px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex-shrink: 1;
        min-width: 0;
      }

      .meta-divider {
        width: 1px;
        height: 12px;
        background: var(--border);
        flex-shrink: 0;
      }

      .snapshot-selected-date {
        font-size: 16px;
        color: var(--text-muted);
        white-space: nowrap;
        flex-shrink: 0;
      }

      .btn-icon {
        width: 24px;
        height: 24px;
        padding: 0;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
      }

      .btn-icon:hover {
        color: var(--text);
      }

      .btn-icon svg {
        width: 24px;
        height: 24px;
        display: block;
      }

      .btn-clear {
        width: 24px;
        height: 24px;
        color: var(--text-placeholder);
      }

      .btn-clear:hover {
        color: #7b8290;
      }

      .btn-clear svg {
        width: 20px;
        height: 20px;
      }

      /* Modal */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 100;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .modal-overlay.is-open {
        display: flex;
      }

      .modal {
        width: 100%;
        max-width: 544px;
        max-height: 544px;
        height: 544px;
        background: var(--bg);
        border-radius: var(--radius);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        padding: 24px;
        gap: 24px;
      }

      .modal-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
        flex-shrink: 0;
      }

      .modal-title {
        margin: 0;
        font-size: 24px;
        font-weight: 700;
        line-height: 1.5;
      }

      .modal-desc {
        margin: 4px 0 0;
        font-size: 16px;
        color: var(--text-muted);
        line-height: 1.5;
      }

      .btn-close-wrap {
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        padding: 0;
      }

      .modal-body {
        flex: 1;
        min-height: 0;
        overflow: hidden;
        display: flex;
        gap: 0;
      }

      .modal-list-scroll {
        flex: 1;
        min-width: 0;
        overflow-y: auto;
        padding-right: 4px;
      }

      .modal-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .modal-snapshot-item {
        display: flex;
        flex-direction: column;
        gap: 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px 16px;
        cursor: pointer;
        background: var(--bg-subtle);
      }

      .modal-snapshot-item:hover:not(.is-disabled) {
        border-color: #ccc;
      }

      .modal-snapshot-item.is-selected {
        border-color: var(--primary);
        background: var(--bg-selected);
      }

      .modal-snapshot-item.is-disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .modal-snapshot-head {
        display: flex;
        gap: 10px;
        align-items: center;
        min-width: 0;
      }

      .radio-icon {
        width: 24px;
        height: 24px;
        flex-shrink: 0;
        color: var(--text-muted);
      }

      .modal-snapshot-item.is-selected .radio-icon {
        color: var(--primary);
      }

      .modal-snapshot-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
        flex: 1;
        overflow: hidden;
      }

      .modal-snapshot-title {
        font-size: 16px;
        font-weight: 700;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .modal-snapshot-date {
        font-size: 16px;
        color: var(--text-muted);
        white-space: nowrap;
        flex-shrink: 0;
      }

      .modal-snapshot-frame {
        font-size: 14px;
        color: var(--text-muted);
        margin: 0;
        word-break: break-word;
      }

      .modal-snapshot-preview {
        font-size: 12px;
        color: var(--text);
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 90px;
        overflow: hidden;
        line-height: 1.5;
      }

      .empty {
        color: var(--text-muted);
        font-size: 14px;
        text-align: center;
        padding: 24px 8px;
        line-height: 1.6;
      }

      /* Result page */
      .result-header {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        border-bottom: 1px solid var(--border);
        padding-bottom: 24px;
      }

      .btn-back-wrap {
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        padding: 0;
      }

      .btn-back-wrap:hover {
        color: var(--primary);
      }

      .result-header-text {
        flex: 1;
        min-width: 0;
      }

      .result-title {
        margin: 0;
        font-size: 24px;
        font-weight: 700;
        line-height: 1.5;
      }

      .result-subtitle {
        margin: 4px 0 0;
        font-size: 16px;
        color: var(--text-muted);
        line-height: 1.5;
      }

      .result-section {
        padding: 24px 0 32px;
        border-bottom: 1px solid var(--border);
      }

      .result-section:last-of-type {
        border-bottom: none;
        padding-bottom: 0;
      }

      .compare-targets {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .compare-target-card {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px 16px;
      }

      .compare-target-line {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        font-size: 16px;
        line-height: 1.5;
      }

      .compare-target-line .label {
        color: var(--primary);
        font-weight: 700;
        white-space: nowrap;
      }

      .compare-target-line .value {
        color: var(--text);
        font-weight: 700;
      }

      .compare-target-line .date {
        color: var(--text-muted);
        font-weight: 400;
        white-space: nowrap;
      }

      .accordion-list {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .accordion {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg-subtle);
        overflow: clip;
      }

      .accordion summary {
        cursor: pointer;
        padding: 12px 16px;
        font-weight: 700;
        font-size: 16px;
        list-style: none;
        display: flex;
        align-items: center;
        gap: 8px;
        user-select: none;
      }

      .accordion summary::-webkit-details-marker {
        display: none;
      }

      .accordion-chevron {
        width: 24px;
        height: 24px;
        flex-shrink: 0;
        color: var(--text);
        transition: transform 0.15s ease;
        transform: rotate(-90deg);
      }

      .accordion[open] .accordion-chevron {
        transform: rotate(0deg);
      }

      .accordion-content {
        padding: 0 16px 12px;
      }

      .diff-sets {
        display: flex;
        flex-direction: column;
      }

      .diff-set .diff-item {
        margin-top: 0;
      }

      .diff-set-divider {
        height: 1px;
        background: var(--border);
        margin: 12px 0;
        border: none;
      }

      .diff-item.is-clickable {
        cursor: pointer;
      }

      .diff-line-label {
        font-size: 14px;
        color: var(--text-muted);
        margin: 0 0 4px;
      }

      .diff-line-label.after-label {
        color: var(--text);
        margin-top: 12px;
      }

      .diff-line {
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 14px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 0 16px;
        min-height: 40px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .diff-line-content {
        flex: 1;
        min-width: 0;
        display: flex;
        align-items: center;
        min-height: 21px;
      }

      .diff-goto-icon {
        flex-shrink: 0;
        width: 16px;
        height: 16px;
        color: var(--text-muted);
        pointer-events: none;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .diff-goto-icon svg {
        display: block;
        width: 16px;
        height: 16px;
      }

      .diff-line.diff-empty {
        color: var(--text-placeholder);
      }

      .hl-add {
        background: var(--success-bg);
        color: var(--success);
        font-weight: 400;
        padding: 2px 4px;
        border-radius: 2px;
      }

      .hl-del {
        color: var(--danger);
        text-decoration: line-through;
        background: var(--danger-bg);
        padding: 2px 4px;
        border-radius: 2px;
      }

      .accordion-empty {
        padding: 4px 0 0;
        font-size: 14px;
        color: var(--text-muted);
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 12px;
        transform: translateX(-50%);
        background: #111;
        color: #fff;
        padding: 8px 12px;
        border-radius: var(--radius);
        font-size: 12px;
        line-height: 1.5;
        text-align: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
        max-width: calc(100% - 24px);
        z-index: 9999;
      }

      .toast.show {
        opacity: 1;
      }

      .toast.error {
        background: var(--danger);
      }

      #inputPage {
        display: block;
      }

      #resultPage {
        display: none;
      }
    </style>
  </head>

      <section class="section">
        <h2 class="section-title">1. 현재 상태 저장</h2>
        <div class="field-group">
          <div class="field-block">
            <label class="field-label" for="snapshotMemo">메모(선택)</label>
            <input
              id="snapshotMemo"
              type="text"
              placeholder="현재 상태에 대한 메모를 입력하세요. 예) QA 반영 전, 카피 수정 후"
            />
          </div>
          <button class="btn-outline-primary" id="saveSnapshot" type="button">현재 상태 저장</button>
          <div id="saveStatus" class="status" aria-live="polite"></div>
        </div>
      </section>

      <section class="section">
        <h2 class="section-title">2. 비교할 스냅샷 선택</h2>

        <div class="snapshot-block">
          <p class="snapshot-block-label">스냅샷 A</p>
          <div class="snapshot-row">
            <div class="snapshot-pick-area" id="snapshotAPick">
              <span class="snapshot-placeholder">현재 상태 저장 시 우선 선택됩니다.</span>
            </div>
            <button class="btn-secondary" id="pickSnapshotA" type="button">스냅샷 선택</button>
          </div>
        </div>

        <div class="snapshot-block">
          <p class="snapshot-block-label">스냅샷 B</p>
          <div class="snapshot-row">
            <div class="snapshot-pick-area" id="snapshotBPick">
              <span class="snapshot-placeholder">비교할 스냅샷을 선택해주세요.</span>
            </div>
            <button class="btn-secondary" id="pickSnapshotB" type="button">스냅샷 선택</button>
          </div>
        </div>
      </section>

      <button class="btn-compare" id="compareBtn" type="button" disabled>비교</button>
    </div>

    <div id="snapshotModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal">
        <header class="modal-header">
          <div>
            <h2 class="modal-title" id="modalTitle">저장된 스냅샷 목록</h2>
            <p class="modal-desc">스냅샷은 최대 10개까지 저장됩니다.</p>
          </div>
          <button class="btn-close-wrap btn-icon" id="closeModal" type="button" aria-label="닫기">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </button>
        </header>
        <div class="modal-body">
          <div class="modal-list-scroll">
            <div id="modalSnapshotList" class="modal-list"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="resultPage">
      <header class="result-header">
        <button class="btn-back-wrap btn-icon" id="backToInput" type="button" aria-label="뒤로가기">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M14.5 6.5L9 12l5.5 5.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
        <div class="result-header-text">
          <h2 class="result-title">결과</h2>
          <p class="result-subtitle">선택한 두 스냅샷의 텍스트 차이를 비교한 결과입니다.</p>
        </div>
      </header>

      <section class="result-section">
        <h3 class="section-title">비교 대상</h3>
        <div id="snapshotCompareInfo" class="compare-targets"></div>
      </section>

      <section class="result-section">
        <div class="section-header">
          <h3 class="section-title">비교 결과</h3>
          <p class="section-desc">카드를 선택하면 해당 텍스트 레이어로 이동합니다.</p>
        </div>
        <div class="accordion-list">
          <details id="addedAccordion" class="accordion">
            <summary id="addedSummary">
              <svg class="accordion-chevron" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M8 10l4 4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
              <span>추가 0건</span>
            </summary>
            <div class="accordion-content">
              <div id="addedResult"></div>
            </div>
          </details>

          <details id="changedAccordion" class="accordion">
            <summary id="changedSummary">
              <svg class="accordion-chevron" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M8 10l4 4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
              <span>변경 0건</span>
            </summary>
            <div class="accordion-content">
              <div id="changedResult"></div>
            </div>
          </details>

          <details id="deletedAccordion" class="accordion">
            <summary id="deletedSummary">
              <svg class="accordion-chevron" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M8 10l4 4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
              <span>삭제 0건</span>
            </summary>
            <div class="accordion-content">
              <div id="deletedResult"></div>
            </div>
          </details>
        </div>
      </section>

      <button class="btn-primary-full" id="saveToFigma" type="button">로그 남기기</button>
    </div>

    <div id="toast" class="toast"></div>

      const PLUGIN_WIDTH = 592;
      const MAX_PLUGIN_HEIGHT = 755;
      const MIN_PLUGIN_HEIGHT = 120;

      function resizePluginWindow() {
        const contentHeight = Math.ceil(document.documentElement.scrollHeight);
        const height = Math.max(
          MIN_PLUGIN_HEIGHT,
          Math.min(contentHeight, MAX_PLUGIN_HEIGHT)
        );
        parent.postMessage(
          { pluginMessage: { type: 'resize-ui', width: PLUGIN_WIDTH, height } },
          '*'
        );
      }

      function scheduleResize() {
        requestAnimationFrame(function () {
          requestAnimationFrame(resizePluginWindow);
        });
      }

      function requestSnapshots() {
        parent.postMessage({ pluginMessage: { type: 'get-snapshots' } }, '*');
      }

      function showToast(message, isError = false) {

        if (toastTimer) clearTimeout(toastTimer);
        toastEl.textContent = message;
        toastEl.classList.toggle('error', isError);
        toastEl.classList.add('show');
        toastTimer = setTimeout(() => {
          toastEl.classList.remove('show');
        }, 2200);
      }

      function formatSnapshotDate(isoString) {
        const date = new Date(isoString);
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');
        return `${year}.${month}.${day} ${hours}:${minutes}`;
      }

      function getSnapshotLabel(snapshot) {
        return snapshot.memo || snapshot.frameName;
      }

      function escapeHtml(text) {
        return String(text == null ? '' : text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function getSnapshotById(snapshotId) {
        return snapshots.find((snapshot) => snapshot.id === snapshotId) || null;
      }

      function renderSelectedSlot(pickEl, snapshotId, placeholderText, onClear) {
        const snapshot = getSnapshotById(snapshotId);
        if (!snapshot) {
          pickEl.innerHTML = `<span class="snapshot-placeholder">${escapeHtml(placeholderText)}</span>`;
          return;
        }

        pickEl.innerHTML = `
          <div class="snapshot-selected">
            <div class="snapshot-meta">
              <span class="snapshot-selected-memo">${escapeHtml(getSnapshotLabel(snapshot))}</span>
              <span class="meta-divider" aria-hidden="true"></span>
              <span class="snapshot-selected-date">${escapeHtml(formatSnapshotDate(snapshot.createdAt))}</span>
            </div>
            <button class="btn-icon btn-clear" type="button" aria-label="선택 해제">${CANCEL_ICON}</button>
          </div>
        `;

        pickEl.querySelector('.btn-clear').onclick = (event) => {
          event.stopPropagation();
          onClear();
          updateCompareButtonState();
          scheduleResize();
        };
      }

      function updateCompareButtonState() {
        const canCompare =
          selectedSnapshotAId &&
          selectedSnapshotBId &&
          selectedSnapshotAId !== selectedSnapshotBId;
        compareBtn.disabled = !canCompare;
        compareBtn.classList.toggle('is-active', canCompare);
      }

      function renderSnapshotSlots() {
        renderSelectedSlot(
          snapshotAPickEl,
          selectedSnapshotAId,
          '현재 상태 저장 시 우선 선택됩니다.',
          () => {
            selectedSnapshotAId = '';
          }
        );
        renderSelectedSlot(
          snapshotBPickEl,
          selectedSnapshotBId,
          '비교할 스냅샷을 선택해주세요.',
          () => {
            selectedSnapshotBId = '';
          }
        );
        updateCompareButtonState();
      }

      function renderModalList() {
        if (!snapshots.length) {
          modalSnapshotListEl.innerHTML =
            '<div class="empty">아직 저장된 스냅샷이 없어요.<br />먼저 현재 상태를 저장해주세요.</div>';
          return;
        }

        const otherSelectedId = modalTarget === 'A' ? selectedSnapshotBId : selectedSnapshotAId;

        modalSnapshotListEl.innerHTML = snapshots
          .map((snapshot) => {
            const preview = snapshot.texts.join('\n').slice(0, 200);
            const primaryLabel = getSnapshotLabel(snapshot);
            const isSelected = snapshot.id === modalSelectedId;
            const isDisabled = snapshot.id === otherSelectedId;
            return `
              <article
                class="modal-snapshot-item${isSelected ? ' is-selected' : ''}${isDisabled ? ' is-disabled' : ''}"
                data-id="${escapeHtml(snapshot.id)}"
                role="button"
                tabindex="${isDisabled ? '-1' : '0'}"
                aria-disabled="${isDisabled ? 'true' : 'false'}"
              >
                <header class="modal-snapshot-head">
                  ${isSelected ? RADIO_CHECKED : RADIO_UNCHECKED}
                  <div class="modal-snapshot-meta">
                    <span class="modal-snapshot-title">${escapeHtml(primaryLabel)}</span>
                    <span class="meta-divider" aria-hidden="true"></span>
                    <span class="modal-snapshot-date">${escapeHtml(formatSnapshotDate(snapshot.createdAt))}</span>
                  </div>
                </header>
                <p class="modal-snapshot-frame">${escapeHtml(snapshot.frameName)}</p>
                <p class="modal-snapshot-preview">${escapeHtml(preview)}${preview.length >= 200 ? '...' : ''}</p>
              </article>
            `;
          })
          .join('');

        modalSnapshotListEl.querySelectorAll('.modal-snapshot-item').forEach((item) => {
          if (item.classList.contains('is-disabled')) return;

          const activate = () => {
            const snapshotId = item.getAttribute('data-id');
            modalSelectedId = snapshotId;
            if (modalTarget === 'A') {
              selectedSnapshotAId = snapshotId;
            } else {
              selectedSnapshotBId = snapshotId;
            }
            closeModal();
            renderSnapshotSlots();
            scheduleResize();
          };

          item.onclick = activate;
          item.onkeydown = (event) => {
            if (event.key === 'Enter' || event.key === ' ') {
              event.preventDefault();
              activate();
            }
          };
        });
      }

      function openModal(target) {
        modalTarget = target;
        modalSelectedId = target === 'A' ? selectedSnapshotAId : selectedSnapshotBId;
        renderModalList();
        snapshotModalEl.classList.add('is-open');
      }

      function closeModal() {
        snapshotModalEl.classList.remove('is-open');
      }

      function updateSnapshotUI(nextSnapshots) {
        snapshots = Array.isArray(nextSnapshots) ? nextSnapshots : [];

        if (selectedSnapshotAId && !getSnapshotById(selectedSnapshotAId)) {
          selectedSnapshotAId = '';
        }
        if (selectedSnapshotBId && !getSnapshotById(selectedSnapshotBId)) {
          selectedSnapshotBId = '';
        }

        renderSnapshotSlots();
        if (snapshotModalEl.classList.contains('is-open')) {
          renderModalList();
        }
        scheduleResize();
      }

      if (pickSnapshotABtn) pickSnapshotABtn.onclick = () => openModal('A');
      if (pickSnapshotBBtn) pickSnapshotBBtn.onclick = () => openModal('B');
      if (closeModalBtn) closeModalBtn.onclick = closeModal;
      if (snapshotModalEl) {
        snapshotModalEl.onclick = (event) => {
          if (event.target === snapshotModalEl) closeModal();
        };
      }

      if (saveSnapshotBtn) {
        saveSnapshotBtn.onclick = () => {
          saveStatusEl.textContent = '선택한 프레임의 텍스트를 저장하는 중...';
          parent.postMessage(
            {
              pluginMessage: {
                type: 'save-snapshot',
                memo: snapshotMemoEl.value || '',
              },
            },
            '*'
          );
        };
      }

      if (backToInputBtn) {
        backToInputBtn.onclick = () => {
          resultPageEl.style.display = 'none';
          inputPageEl.style.display = 'block';
          scheduleResize();
        };
      }

      function getTextEntries(snapshot) {
        if (Array.isArray(snapshot.textEntries) && snapshot.textEntries.length > 0) {
          return snapshot.textEntries;
        }
        return (snapshot.texts || []).map((text) => ({ text, nodeId: '' }));
      }

      function focusTextNode(nodeId) {
        if (!nodeId) {
          showToast('이 스냅샷에는 위치 정보가 없어요. 프레임을 다시 저장해주세요.', true);
          return;
        }
        parent.postMessage({ pluginMessage: { type: 'focus-text-node', nodeId } }, '*');
      }

      function makeDiffLineWithIcon(innerHtml) {
        return `
          <div class="diff-line">
            <div class="diff-line-content">${innerHtml}</div>
            ${MY_LOCATION_ICON}
          </div>
        `;
      }

      function makeDiffItemHtml(nodeId, contentHtml) {
        if (!nodeId) {
          return `<div class="diff-item">${contentHtml}</div>`;
        }
        return `
          <div
            class="diff-item is-clickable"
            data-node-id="${escapeHtml(nodeId)}"
            title="클릭하면 Figma에서 해당 텍스트로 이동"
            role="button"
            tabindex="0"
          >
            ${contentHtml}
          </div>
        `;
      }

      function joinDiffSets(itemHtmlList) {
        if (!itemHtmlList.length) return '';
        return `<div class="diff-sets">${itemHtmlList
          .map((html, index) => {
            const divider =
              index < itemHtmlList.length - 1
                ? '<div class="diff-set-divider" role="separator" aria-hidden="true"></div>'
                : '';
            return `<div class="diff-set">${html}</div>${divider}`;
          })
          .join('')}</div>`;
      }

      function bindDiffItemClicks(container) {
        if (!container) return;
        container.querySelectorAll('.diff-item.is-clickable').forEach((item) => {
          const nodeId = item.getAttribute('data-node-id');
          const activate = () => focusTextNode(nodeId);
          item.onclick = activate;
          item.onkeydown = (event) => {
            if (event.key === 'Enter' || event.key === ' ') {
              event.preventDefault();
              activate();
            }
          };
        });
      }

      function makeInlineDiff(beforeLine, afterLine) {
        if (beforeLine === afterLine) {
          return {
            beforeHtml: escapeHtml(beforeLine),
            afterHtml: escapeHtml(afterLine),
          };
        }

        let start = 0;
        const minLen = Math.min(beforeLine.length, afterLine.length);
        while (start < minLen && beforeLine[start] === afterLine[start]) start += 1;

        let endBefore = beforeLine.length - 1;
        let endAfter = afterLine.length - 1;
        while (endBefore >= start && endAfter >= start && beforeLine[endBefore] === afterLine[endAfter]) {
          endBefore -= 1;
          endAfter -= 1;
        }

        const beforePrefix = beforeLine.slice(0, start);
        const beforeChanged = beforeLine.slice(start, endBefore + 1);
        const beforeSuffix = beforeLine.slice(endBefore + 1);

        const afterPrefix = afterLine.slice(0, start);
        const afterChanged = afterLine.slice(start, endAfter + 1);
        const afterSuffix = afterLine.slice(endAfter + 1);

        const beforeHtml =
          escapeHtml(beforePrefix) +
          (beforeChanged ? `<span class="hl-del">${escapeHtml(beforeChanged)}</span>` : '') +
          escapeHtml(beforeSuffix);

        const afterHtml =
          escapeHtml(afterPrefix) +
          (afterChanged ? `<span class="hl-add">${escapeHtml(afterChanged)}</span>` : '') +
          escapeHtml(afterSuffix);

        return { beforeHtml, afterHtml };
      }

      function summarizeChangesByIndex(entriesA, entriesB) {
        const added = [];
        const changed = [];
        const deleted = [];
        const max = Math.max(entriesA.length, entriesB.length);

        for (let i = 0; i < max; i++) {
          const entryA = entriesA[i];
          const entryB = entriesB[i];
          const beforeText = entryA ? entryA.text.trim() : '';
          const afterText = entryB ? entryB.text.trim() : '';

          if (entryA && entryB) {
            if (beforeText !== afterText && (beforeText || afterText)) {
              changed.push({
                before: beforeText,
                after: afterText,
                nodeId: entryB.nodeId || entryA.nodeId || '',
              });
            }
          } else if (!entryA && entryB && afterText) {
            added.push({ text: afterText, nodeId: entryB.nodeId || '' });
          } else if (entryA && !entryB && beforeText) {
            deleted.push({ text: beforeText, nodeId: entryA.nodeId || '' });
          }
        }

        return { added, changed, deleted };
      }

      function summarizeChangesByNodeId(entriesA, entriesB) {
        const added = [];
        const changed = [];
        const deleted = [];
        const mapA = new Map();
        const mapB = new Map();

        entriesA.forEach((entry) => {
          if (entry.nodeId) mapA.set(entry.nodeId, entry);
        });
        entriesB.forEach((entry) => {
          if (entry.nodeId) mapB.set(entry.nodeId, entry);
        });

        mapB.forEach((entryB, nodeId) => {
          const entryA = mapA.get(nodeId);
          const afterText = entryB.text.trim();
          if (!entryA) {
            if (afterText) added.push({ text: afterText, nodeId });
            return;
          }
          const beforeText = entryA.text.trim();
          if (beforeText !== afterText && (beforeText || afterText)) {
            changed.push({ before: beforeText, after: afterText, nodeId });
          }
        });

        mapA.forEach((entryA, nodeId) => {
          if (mapB.has(nodeId)) return;
          const beforeText = entryA.text.trim();
          if (beforeText) deleted.push({ text: beforeText, nodeId });
        });

        return { added, changed, deleted };
      }

      function summarizeChanges(snapshotA, snapshotB) {
        const entriesA = getTextEntries(snapshotA);
        const entriesB = getTextEntries(snapshotB);
        const canMatchByNodeId =
          entriesA.some((entry) => entry.nodeId) && entriesB.some((entry) => entry.nodeId);

        if (canMatchByNodeId) {
          return summarizeChangesByNodeId(entriesA, entriesB);
        }

        return summarizeChangesByIndex(entriesA, entriesB);
      }

      function renderCompareTargets(snapshotA, snapshotB) {
        snapshotCompareInfoEl.innerHTML = `
          <div class="compare-target-card">
            <div class="compare-target-line">
              <span class="label">스냅샷 A :</span>
              <span class="value">${escapeHtml(getSnapshotLabel(snapshotA))}</span>
              <span class="meta-divider" aria-hidden="true"></span>
              <span class="date">${escapeHtml(formatSnapshotDate(snapshotA.createdAt))}</span>
            </div>
          </div>
          <div class="compare-target-card">
            <div class="compare-target-line">
              <span class="label">스냅샷 B :</span>
              <span class="value">${escapeHtml(getSnapshotLabel(snapshotB))}</span>
              <span class="meta-divider" aria-hidden="true"></span>
              <span class="date">${escapeHtml(formatSnapshotDate(snapshotB.createdAt))}</span>
            </div>
          </div>
        `;
      }

      function updateAccordionSummary(summaryEl, label, count) {
        const textSpan = summaryEl.querySelector('span:last-child');
        if (textSpan) {
          textSpan.textContent = `${label} ${count}건`;
        }
      }

      function renderAccordionResults(added, changed, deleted) {
        updateAccordionSummary(addedSummaryEl, '추가', added.length);
        updateAccordionSummary(changedSummaryEl, '변경', changed.length);
        updateAccordionSummary(deletedSummaryEl, '삭제', deleted.length);

        addedAccordionEl.open = false;
        changedAccordionEl.open = false;
        deletedAccordionEl.open = false;

        if (added.length === 0) {
          addedResultEl.innerHTML = '<p class="accordion-empty">추가된 항목이 없습니다.</p>';
        } else {
          addedResultEl.innerHTML = joinDiffSets(
            added.map((item) =>
              makeDiffItemHtml(
                item.nodeId,
                `
                <p class="diff-line-label">Before</p>
                <div class="diff-line diff-empty">—</div>
                <p class="diff-line-label after-label">After</p>
                ${makeDiffLineWithIcon(`<span class="hl-add">${escapeHtml(item.text)}</span>`)}
              `
              )
            )
          );
        }

        if (changed.length === 0) {
          changedResultEl.innerHTML = '<p class="accordion-empty">변경된 항목이 없습니다.</p>';
        } else {
          changedResultEl.innerHTML = joinDiffSets(
            changed.map((item) => {
              const diff = makeInlineDiff(item.before, item.after);
              return makeDiffItemHtml(
                item.nodeId,
                `
                  <p class="diff-line-label">Before</p>
                  <div class="diff-line">${diff.beforeHtml}</div>
                  <p class="diff-line-label after-label">After</p>
                  ${makeDiffLineWithIcon(diff.afterHtml)}
                `
              );
            })
          );
        }

        if (deleted.length === 0) {
          deletedResultEl.innerHTML = '<p class="accordion-empty">삭제된 항목이 없습니다.</p>';
        } else {
          deletedResultEl.innerHTML = joinDiffSets(
            deleted.map((item) =>
              makeDiffItemHtml(
                item.nodeId,
                `
                <p class="diff-line-label">Before</p>
                ${makeDiffLineWithIcon(`<span class="hl-del">${escapeHtml(item.text)}</span>`)}
                <p class="diff-line-label after-label">After</p>
                <div class="diff-line diff-empty">—</div>
              `
              )
            )
          );
        }

        bindDiffItemClicks(addedResultEl);
        bindDiffItemClicks(changedResultEl);
        bindDiffItemClicks(deletedResultEl);

        scheduleResize();
      }

      [addedAccordionEl, changedAccordionEl, deletedAccordionEl].forEach((accordionEl) => {
        if (!accordionEl) return;
        accordionEl.addEventListener('toggle', scheduleResize);
      });

      if (compareBtn) {
        compareBtn.onclick = () => {
          const snapshotA = getSnapshotById(selectedSnapshotAId);
          const snapshotB = getSnapshotById(selectedSnapshotBId);

          if (!snapshotA || !snapshotB) {
            showToast('비교할 스냅샷 A와 B를 모두 선택해주세요.', true);
            return;
          }

          if (snapshotA.id === snapshotB.id) {
            showToast('서로 다른 스냅샷 2개를 선택해주세요.', true);
            return;
          }

          const { added, changed, deleted } = summarizeChanges(snapshotA, snapshotB);

          renderCompareTargets(snapshotA, snapshotB);
          renderAccordionResults(added, changed, deleted);

          latestResult = {
            summary: `추가 ${added.length}건 | 변경 ${changed.length}건 | 삭제 ${deleted.length}건`,
            snapshotA: {
              memo: snapshotA.memo,
              frameName: snapshotA.frameName,
              createdAt: snapshotA.createdAt,
            },
            snapshotB: {
              memo: snapshotB.memo,
              frameName: snapshotB.frameName,
              createdAt: snapshotB.createdAt,
            },
            added: added.map((item) => item.text),
            changed: changed.map((item) => ({ before: item.before, after: item.after })),
            deleted: deleted.map((item) => item.text),
          };

          inputPageEl.style.display = 'none';
          resultPageEl.style.display = 'block';
          scheduleResize();
        };
      }

      if (saveToFigmaBtn) {
        saveToFigmaBtn.onclick = () => {
          if (!latestResult) {
            showToast('먼저 비교를 실행해 결과를 만들어주세요.', true);
            return;
          }
          showToast('로그 페이지에 기록하는 중...');
          parent.postMessage({ pluginMessage: { type: 'save-log', payload: latestResult } }, '*');
        };
      }

      window.onmessage = (event) => {
        const msg = event.data.pluginMessage;
        if (!msg) return;

        if (msg.type === 'snapshots-loaded') {
          updateSnapshotUI(msg.snapshots || []);
          if (msg.message) showToast(msg.message, true);
          return;
        }

        if (msg.type === 'save-snapshot-result') {
          if (msg.ok) {
            snapshotMemoEl.value = '';
            if (msg.snapshot && msg.snapshot.id) {
              selectedSnapshotAId = msg.snapshot.id;
            }
            updateSnapshotUI(msg.snapshots || []);
          }
          saveStatusEl.textContent = msg.message || (msg.ok ? '저장 완료' : '저장 실패');
          showToast(saveStatusEl.textContent, !msg.ok);
          return;
        }

        if (msg.type === 'save-log-result') {
          showToast(msg.message || (msg.ok ? '저장 완료' : '저장 실패'), !msg.ok);
          return;
        }

        if (msg.type === 'focus-text-node-result') {
          if (!msg.ok) {
            showToast(msg.message || '레이어로 이동하지 못했어요.', true);
          }
          return;
        }
      };

      requestSnapshots();
      scheduleResize();

      if (typeof ResizeObserver !== 'undefined') {
        const resizeObserver = new ResizeObserver(scheduleResize);
        resizeObserver.observe(document.body);
      }
    </script>
  </body>
</html>
